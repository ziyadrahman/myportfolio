  <!-- ========================= -->
  <!-- 📊 Google Analytics + Logic -->
  <!-- ========================= -->

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-SWV74FMPV8"></script>

  <script>
    // ✅ Declare ONCE globally
    const CLIENT_NAME = document.querySelector('meta[name="client-name"]').content;

    // Google Analytics setup
    window.dataLayer = window.dataLayer || [];
    function gtag(){ dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-SWV74FMPV8', {
      page_title: 'Redirect - ' + CLIENT_NAME,
      page_path: location.pathname
    });

    // Track click (slight delay for accuracy)
    setTimeout(() => {
      gtag('event', 'redirect_ctr_test', {
        client_name: CLIENT_NAME
      });
    }, 500);
  </script>

  <!-- ========================= -->
  <!-- 🔁 Redirect -->
  <!-- ========================= -->

  <!-- ⚠️ Change only if needed -->
  <meta http-equiv="refresh" content="2;url=https://ziyadrahman.github.io/myportfolio/">

  <script>
    setTimeout(function() {
      window.location.href = "https://ziyadrahman.github.io/myportfolio/";
    }, 2000);
  </script>

  <title>Loading…</title>
</head>

<body>

  <!-- Dynamic Greeting -->

  <script>

    window.addEventListener("DOMContentLoaded", () => {
      document.getElementById("greeting").innerText =

  <p style="font-family: system-ui, sans-serif; text-align: center;">
